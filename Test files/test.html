<html>
    <head>
        <link rel="stylesheet" href="test.css">
    </head>
    <body>
        <!-- The Trigger Button -->
        <button popovertarget="my-popout">Click to See More</button>

        <!-- The Pop-out Content -->
        <div id="my-popout" popover>
        <h2>Inside the Pop-out!</h2>
        <p>This is a separate "page" content appearing right here.</p>
        
        <!-- A button inside to close it -->
        <button popovertarget="my-popout" popovertargetaction="hide">Close Box</button>
        </div>
    </body>
</html>
